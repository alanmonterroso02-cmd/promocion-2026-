<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Categorías - Promoción 2026</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <h1>Crear Nueva Colección</h1>
    <h2>Promoción 2026</h2>

    <input
        type="text"
        id="nombreCategoria"
        placeholder="Ejemplo: playeras"
    >

    <br><br>

    <button onclick="crearColeccion()">
        Crear Colección
    </button>

    <br><br>

    <div id="mensaje"></div>
    <!-- login obligatorio --> 
    <script>
    // Verificar si inició sesión
    if (localStorage.getItem("logueado") !== "true") {
        alert("Debes iniciar sesión primero");
        window.location.href = "index.html";
    }
    </script>
    <script type="module" src="js/categorias.js"></script>

</body>
</html>
